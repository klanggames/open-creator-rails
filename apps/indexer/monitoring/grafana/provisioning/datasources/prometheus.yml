apiVersion: 1

# GF_PROMETHEUS_URL controls where Grafana finds Prometheus.
# Local Docker:  GF_PROMETHEUS_URL=http://prometheus:9090        (default)
# Railway:       GF_PROMETHEUS_URL=http://prometheus.railway.internal:9090

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: $GF_PROMETHEUS_URL
    isDefault: true
    editable: false
