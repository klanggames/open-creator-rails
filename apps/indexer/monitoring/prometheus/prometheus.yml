global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ponder
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      # Only scrape containers that have ponder.role label
      - source_labels: [__meta_docker_container_label_ponder_role]
        regex: .+
        action: keep
      # Build address from network IP + metrics port label
      - source_labels: [__meta_docker_network_ip, __meta_docker_container_label_ponder_metrics_port]
        separator: ":"
        target_label: __address__
      # Expose role (worker/api) and container name as labels
      - source_labels: [__meta_docker_container_label_ponder_role]
        target_label: role
      - source_labels: [__meta_docker_container_name]
        target_label: instance
        regex: /(.+)
        replacement: $1
    metrics_path: /metrics
