services:
  # 1. Postgres database (shared by worker + API)
  postgres:
    image: postgres:15-alpine
    container_name: ocr_ponder_db
    environment:
      POSTGRES_USER: ponder
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ponder_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ponder -d ponder_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Worker — indexes chain data and creates/updates views when caught up
  worker:
    build:
      context: ../..  # monorepo root (workspace deps live here)
      dockerfile: apps/indexer/Dockerfile
    container_name: ocr_indexer_worker
    ports:
      - "42070:42070"  # worker HTTP (for health checks)
    labels:
      ponder.role: worker
      ponder.metrics_port: "42070"
    environment:
      PONDER_ROLE: worker
      DATABASE_URL: postgres://ponder:password@postgres:5432/ponder_db
      PONDER_RPC_URL_11155111: ${PONDER_RPC_URL_11155111:?PONDER_RPC_URL_11155111 is required. Set it in your shell or apps/indexer/.env}
      DEPLOYMENT_MODE: blue-green
      VIEWS_SCHEMA: ocr_indexer
      STABLE_SCHEMA: ocr_indexer_live
      PORT: 42070
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:42070/ready || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 300s  # allow 5 min for backfill before first check
      retries: 120
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # 3. API — serves GraphQL/SQL from the views schema (zero downtime)
  #    On first run: restarts until the worker creates the views schema.
  #    After that: always up, independent of worker lifecycle.
  api:
    build:
      context: ../..
      dockerfile: apps/indexer/Dockerfile
    container_name: ocr_indexer_api
    ports:
      - "42069:42069"  # public GraphQL endpoint
    labels:
      ponder.role: api
      ponder.metrics_port: "42069"
    environment:
      PONDER_ROLE: api
      DATABASE_URL: postgres://ponder:password@postgres:5432/ponder_db
      VIEWS_SCHEMA: ocr_indexer
      PORT: 42069
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # 4. Prometheus — scrapes Ponder worker metrics (/metrics on port 42070)
  prometheus:
    image: prom/prometheus:latest
    container_name: ocr_prometheus
    user: root  # required to access Docker socket on macOS
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - worker
    restart: unless-stopped

  # 5. Grafana — dashboards for sync lag, API latency, errors
  grafana:
    image: grafana/grafana:latest
    container_name: ocr_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PROMETHEUS_URL: http://prometheus:9090
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

# Persist DB data so you don't re-index every restart
volumes:
  postgres_data:
  prometheus_data:
  grafana_data: